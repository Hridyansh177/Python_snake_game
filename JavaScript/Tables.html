<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>

     <link rel="stylesheet" href="design.css">

</head>
<body>
    <table border="2" cellspacing="5" cellpadding="10">
        <caption>This is a table</caption>
        <tr style="background-color: lightblue;" >
            <th>Name</th>
            <th>Age</th>
            <th>Am I cool?</th>
        </tr>
        <tr style="background-color: lightgreen;">
            <td>Hridyansh</td>
            <td>18</td>
            <td>Yess, you the coolest</td>
        </tr>
        <tr style="background-color: lightyellow;">
            <td>Not Hridyansh</td>
            <td>not 18</td>
            <td>Nah</td>
        </tr>
    </table>
    <ul>
        <li>Hero</li>
        <li>will</li>
        <li style="background-image: linear-gradient(to black,yellow, white);">always</li>
        <li>fall</li>
    </ul>
    <ol type="I">
        <li>Hero</li>
        <li>will</li>
        <li>never</li>
        <li>fall</li>
    </ol>
</body>
</html>
